<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>用户管理 - 智慧农业植物病害检测系统</title>
    <script src="/static/vendor/vue.global.js"></script>
    <script src="/static/vendor/element-plus.full.js"></script>
    <link rel="stylesheet" href="/static/vendor/element-plus.css" />
    <style>
        html, body { margin: 0; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0fdf4; }
        /* ===== 统一顶栏 ===== */
        .app-header {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 60%, #15803d 100%);
            padding: 0 24px; height: 56px; display: flex; align-items: center; gap: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,.15); position: sticky; top: 0; z-index: 100;
        }
        .hd-left { display:flex; align-items:center; gap:10px; flex-shrink:0; }
        .hd-left img { width:34px; height:34px; border-radius:50%; border:2px solid rgba(255,255,255,.4); }
        .hd-title { margin:0; color:white; font-weight:700; font-size:1.05rem; white-space:nowrap; }
        .hd-nav { flex:1; display:flex; align-items:center; justify-content:center; gap:4px; overflow:hidden; }
        .hd-user { display:flex; align-items:center; gap:8px; flex-shrink:0; }
        .hd-username { color:rgba(255,255,255,.9); font-size:13px; white-space:nowrap; }
        .nav-btn { background:rgba(255,255,255,.15) !important; border:1px solid rgba(255,255,255,.25) !important; color:white !important; font-size:12px !important; padding:4px 10px !important; white-space:nowrap; }
        .nav-btn:hover { background:rgba(255,255,255,.28) !important; }
        .admin-btn { background:rgba(251,191,36,.25) !important; border-color:rgba(251,191,36,.45) !important; }
        .nav-sep { color:rgba(255,255,255,.35); margin:0 2px; font-size:16px; }
        .logout-btn { border-color:rgba(255,255,255,.4) !important; color:white !important; background:rgba(255,255,255,.1) !important; }
        /* ===== 内容区 ===== */
        .app-content { width: 100%; max-width: 1200px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        #app { width: 100%; }

        .page-head {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
        }
        .page-title { margin: 0; color: #166534; font-size: 1.4rem; font-weight: 700; }

        .auth-card {
            background: #fff; border-radius: 10px; padding: 16px 20px;
            box-shadow: 0 1px 6px rgba(0,0,0,.08); margin-bottom: 18px;
            display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
        }
        .auth-card label { font-size: 14px; color: #374151; font-weight: 500; white-space: nowrap; }

        .filter-card {
            background: #fff; border-radius: 10px; padding: 14px 20px;
            box-shadow: 0 1px 6px rgba(0,0,0,.08); margin-bottom: 18px;
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
        }

        .table-wrap { width: 100%; overflow-x: auto; border-radius: 10px; box-shadow: 0 1px 6px rgba(0,0,0,.08); }
        .data-table { width: 100%; min-width: 700px; border-collapse: collapse; background: #fff; font-size: 14px; }
        .data-table th {
            background: #f0fdf4; color: #166534; font-weight: 600;
            padding: 11px 14px; border-bottom: 2px solid #bbf7d0;
            text-align: left; white-space: nowrap;
        }
        .data-table td { padding: 11px 14px; border-bottom: 1px solid #f3f4f6; color: #1f2937; vertical-align: middle; }
        .data-table tr:hover td { background: #f0fdf4; }
        .data-table .no-data { text-align: center; color: #9ca3af; padding: 40px; }

        .status-tag { display: inline-block; padding: 2px 12px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        .status-on  { background: #dcfce7; color: #166534; }
        .status-off { background: #fee2e2; color: #991b1b; }

        .role-tag { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        .role-admin { background: #fef3c7; color: #92400e; }
        .role-user  { background: #eff6ff; color: #1e40af; }

        .action-btns { display: flex; gap: 6px; flex-wrap: wrap; }
        .btn-sm {
            padding: 3px 10px; font-size: 12px; border-radius: 5px;
            cursor: pointer; border: 1px solid; background: transparent; transition: all .15s;
        }
        .btn-enable  { color: #16a34a; border-color: #86efac; }
        .btn-enable:hover  { background: #dcfce7; }
        .btn-disable { color: #dc2626; border-color: #fca5a5; }
        .btn-disable:hover { background: #fee2e2; }
        .btn-reset   { color: #2563eb; border-color: #93c5fd; }
        .btn-reset:hover   { background: #eff6ff; }
        .btn-delete  { color: #9ca3af; border-color: #d1d5db; }
        .btn-delete:hover  { background: #f3f4f6; color: #374151; }

        .native-select {
            height: 32px; padding: 0 8px; border: 1px solid #dcdfe6; border-radius: 4px;
            background: #fff; font-size: 14px; color: #606266; cursor: pointer; outline: none;
        }
        .native-select:focus { border-color: #409eff; }

        .stats-row {
            display: flex; gap: 14px; margin-bottom: 18px; flex-wrap: wrap;
        }
        .stat-card {
            flex: 1; min-width: 120px; background: #fff; border-radius: 10px;
            padding: 14px 18px; box-shadow: 0 1px 6px rgba(0,0,0,.08);
            display: flex; flex-direction: column; gap: 4px;
        }
        .stat-label { font-size: 12px; color: #6b7280; }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: #166534; }
    </style>
</head>
<body>
<div id="app">
    <!-- 统一顶栏 -->
    <div class="app-header">
        <div class="hd-left">
            <img src="./images/logo.png" alt="Logo" />
            <h2 class="hd-title">智慧茶叶病害检测</h2>
        </div>
        <div class="hd-nav">
            <el-button class="nav-btn admin-btn" size="small" @click="navTo('tea-knowledge-admin.html')">📝 知识库管理</el-button>
            <el-button class="nav-btn admin-btn" size="small" disabled style="opacity:.6;">👥 用户管理</el-button>
            <el-button class="nav-btn admin-btn" size="small" @click="navTo('log-manage.html')">📋 系统日志</el-button>
            <span class="nav-sep">│</span>
            <el-button class="nav-btn" size="small" @click="navTo('detect.html')">📸 图像检测</el-button>
            <el-button class="nav-btn" size="small" @click="navTo('video-detect.html')">🎬 视频检测</el-button>
            <el-button class="nav-btn" size="small" @click="navTo('realtime-detect.html')">📹 实时检测</el-button>
            <el-button class="nav-btn" size="small" @click="navTo('detection-history.html')">📋 检测历史</el-button>
            <el-button class="nav-btn" size="small" @click="navTo('tea-knowledge.html')">📚 茶树知识</el-button>
        </div>
        <div class="hd-user">
            <span class="hd-username">👤 {{ authUser || '管理员' }}</span>
            <el-button class="logout-btn" type="danger" size="small" plain @click="goLogin">退出</el-button>
        </div>
    </div>
    <div class="app-content">
    <!-- 未登录 / 非管理员提示 -->
    <div v-if="!allowed" style="padding:60px;text-align:center;">
        <el-alert type="warning" title="无权访问"
                  description="请使用管理员账号登录后重试。" show-icon :closable="false" />
        <el-button style="margin-top:20px;" @click="goLogin">去登录</el-button>
    </div>

    <template v-else>
        <!-- 页头 -->
        <div class="page-head">
            <h1 class="page-title">👥 用户管理</h1>
            <div style="display:flex;gap:10px;flex-wrap:wrap;">
                <el-button type="primary" @click="openCreate">新增用户</el-button>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-row">
            <div class="stat-card">
                <span class="stat-label">总用户数</span>
                <span class="stat-value">{{ stats.total }}</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">已启用</span>
                <span class="stat-value" style="color:#16a34a;">{{ stats.enabled }}</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">已禁用</span>
                <span class="stat-value" style="color:#dc2626;">{{ stats.disabled }}</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">管理员</span>
                <span class="stat-value" style="color:#d97706;">{{ stats.admins }}</span>
            </div>
        </div>

        <!-- 搜索栏 -->
        <div class="filter-card">
            <el-input v-model="filterQ" placeholder="搜索用户名/姓名" clearable
                      style="width:220px;" @keyup.enter="loadTable(true)" />
            <select v-model="filterStatus" class="native-select" @change="loadTable(true)">
                <option value="">全部状态</option>
                <option value="1">已启用</option>
                <option value="0">已禁用</option>
            </select>
            <el-button type="primary" @click="loadTable(true)">搜索</el-button>
            <el-button @click="resetFilter">重置</el-button>
        </div>

        <!-- 表格 -->
        <div class="table-wrap">
            <table class="data-table">
                <thead>
                    <tr>
                        <th style="width:60px;">ID</th>
                        <th>用户名</th>
                        <th>姓名</th>
                        <th style="width:80px;">角色</th>
                        <th style="width:80px;">状态</th>
                        <th style="width:90px;">检测次数</th>
                        <th style="width:168px;">注册时间</th>
                        <th style="width:200px;">操作</th>
                    </tr>
                </thead>
                <tbody v-if="rows.length">
                    <tr v-for="row in rows" :key="row.id">
                        <td>{{ row.id }}</td>
                        <td><b>{{ row.username }}</b></td>
                        <td>{{ row.realName }}</td>
                        <td>
                            <span :class="['role-tag', row.role === 'admin' ? 'role-admin' : 'role-user']">
                                {{ row.role === 'admin' ? '管理员' : '普通用户' }}
                            </span>
                        </td>
                        <td>
                            <span :class="['status-tag', row.status === 1 ? 'status-on' : 'status-off']">
                                {{ row.status === 1 ? '启用' : '禁用' }}
                            </span>
                        </td>
                        <td style="text-align:center;">{{ row.detection_count }}</td>
                        <td style="color:#6b7280;">{{ row.created_at?.slice(0,19)?.replace('T',' ') }}</td>
                        <td>
                            <div class="action-btns">
                                <button v-if="row.status === 1" class="btn-sm btn-disable"
                                        @click="toggleStatus(row, 0)">禁用</button>
                                <button v-else class="btn-sm btn-enable"
                                        @click="toggleStatus(row, 1)">启用</button>
                                <button class="btn-sm btn-reset"
                                        @click="openReset(row)">重置密码</button>
                                <button class="btn-sm btn-delete"
                                        @click="doDelete(row)">删除</button>
                            </div>
                        </td>
                    </tr>
                </tbody>
                <tbody v-else>
                    <tr><td colspan="8" class="no-data">
                        <span v-if="loading">加载中…</span>
                        <span v-else>暂无数据，请先以管理员身份登录</span>
                    </td></tr>
                </tbody>
            </table>
        </div>

        <!-- 分页 -->
        <div style="margin-top:16px;display:flex;justify-content:flex-end;">
            <el-pagination
                v-model:current-page="page"
                v-model:page-size="pageSize"
                :total="total"
                :page-sizes="[10,20,50]"
                layout="total, sizes, prev, pager, next"
                background
                @size-change="loadTable(true)"
                @current-change="loadTable(false)"
            />
        </div>

        <!-- 新增用户对话框 -->
        <el-dialog v-model="createVisible" title="新增用户" width="420px" :close-on-click-modal="false">
            <el-form :model="createForm" label-width="80px">
                <el-form-item label="用户名">
                    <el-input v-model="createForm.username" placeholder="至少3位" clearable />
                </el-form-item>
                <el-form-item label="姓名">
                    <el-input v-model="createForm.realName" placeholder="可选，默认同用户名" clearable />
                </el-form-item>
                <el-form-item label="密码">
                    <el-input v-model="createForm.password" type="password" show-password placeholder="至少6位" />
                </el-form-item>
            </el-form>
            <template #footer>
                <el-button @click="createVisible = false">取消</el-button>
                <el-button type="primary" :loading="saving" @click="doCreate">创建</el-button>
            </template>
        </el-dialog>

        <!-- 重置密码对话框 -->
        <el-dialog v-model="resetVisible" :title="`重置密码 — ${resetTarget?.username}`"
                   width="380px" :close-on-click-modal="false">
            <el-form label-width="90px">
                <el-form-item label="新密码">
                    <el-input v-model="newPassword" type="password" show-password
                              placeholder="至少6位" clearable />
                </el-form-item>
            </el-form>
            <template #footer>
                <el-button @click="resetVisible = false">取消</el-button>
                <el-button type="primary" :loading="saving" @click="doResetPassword">确定重置</el-button>
            </template>
        </el-dialog>
    </template>
    </div><!-- /app-content -->
</div>

<script>
const { createApp, ref, onMounted } = Vue;

// 复用与其他页面相同的 UserCache
const UserCache = {
    USER_KEY: 'yyxz_core_user_info',
    getUser() {
        try { return JSON.parse(localStorage.getItem(this.USER_KEY)); } catch { return null; }
    },
};

createApp({
    setup() {
        const allowed   = ref(false);
        const authUser  = ref('');

        const stats = ref({ total: 0, enabled: 0, disabled: 0, admins: 0 });
        const loading   = ref(false);
        const rows      = ref([]);
        const total     = ref(0);
        const page      = ref(1);
        const pageSize  = ref(20);
        const filterQ   = ref('');
        const filterStatus = ref('');

        const createVisible = ref(false);
        const createForm    = ref({ username: '', realName: '', password: '' });

        const resetVisible  = ref(false);
        const resetTarget   = ref(null);
        const newPassword   = ref('');

        const saving = ref(false);

        function readAuth() {
            const u = UserCache.getUser();
            if (u && u.role === 'admin') {
                authUser.value = u.username || '';
                allowed.value = true;
            }
        }

        function authHeader() {
            return 'Bearer ' + (localStorage.getItem('yyxz_token') || '');
        }

        function apiCall(method, url, body) {
            const opts = {
                method,
                headers: {
                    'Authorization': authHeader(),
                    'Content-Type': 'application/json',
                },
            };
            if (body) opts.body = JSON.stringify(body);
            return fetch(url, opts).then(r => r.json());
        }

        async function loadTable(resetPage) {
            if (resetPage) page.value = 1;
            loading.value = true;
            try {
                const params = new URLSearchParams({
                    page: page.value,
                    page_size: pageSize.value,
                    q: filterQ.value,
                });
                const res = await apiCall('GET', '/api/admin/users?' + params.toString());
                if (res.code === 200) {
                    rows.value  = res.data.items;
                    total.value = res.data.total;
                    stats.value.total    = res.data.total;
                    stats.value.enabled  = rows.value.filter(r => r.status === 1).length;
                    stats.value.disabled = rows.value.filter(r => r.status !== 1).length;
                    stats.value.admins   = rows.value.filter(r => r.role === 'admin').length;
                } else {
                    ElementPlus.ElMessage.error(res.message || '获取失败，请重新登录');
                }
            } catch (e) {
                ElementPlus.ElMessage.error('请求失败：' + e.message);
            } finally {
                loading.value = false;
            }
        }

        function resetFilter() {
            filterQ.value = '';
            filterStatus.value = '';
            loadTable(true);
        }

        async function toggleStatus(row, newStatus) {
            const label = newStatus === 1 ? '启用' : '禁用';
            try {
                await ElementPlus.ElMessageBox.confirm(
                    `确定要${label}用户「${row.username}」吗？`, '确认操作',
                    { confirmButtonText: '确定', cancelButtonText: '取消', type: 'warning' }
                );
            } catch { return; }
            const res = await apiCall('PUT',
                `/api/admin/users/${encodeURIComponent(row.username)}/status`,
                { status: newStatus });
            if (res.code === 200) {
                ElementPlus.ElMessage.success(`已${label}`);
                loadTable(false);
            } else {
                ElementPlus.ElMessage.error(res.message);
            }
        }

        function openReset(row) {
            resetTarget.value = row;
            newPassword.value = '';
            resetVisible.value = true;
        }

        async function doResetPassword() {
            if (!newPassword.value || newPassword.value.length < 6) {
                return ElementPlus.ElMessage.warning('密码至少6位');
            }
            saving.value = true;
            try {
                const res = await apiCall('PUT',
                    `/api/admin/users/${encodeURIComponent(resetTarget.value.username)}/password`,
                    { new_password: newPassword.value });
                if (res.code === 200) {
                    ElementPlus.ElMessage.success('密码已重置');
                    resetVisible.value = false;
                } else {
                    ElementPlus.ElMessage.error(res.message);
                }
            } finally {
                saving.value = false;
            }
        }

        async function doDelete(row) {
            try {
                await ElementPlus.ElMessageBox.confirm(
                    `确定要删除用户「${row.username}」？此操作不可恢复！`, '删除确认',
                    { confirmButtonText: '删除', cancelButtonText: '取消',
                      type: 'error', confirmButtonClass: 'el-button--danger' }
                );
            } catch { return; }
            const res = await apiCall('DELETE',
                `/api/admin/users/${encodeURIComponent(row.username)}`);
            if (res.code === 200) {
                ElementPlus.ElMessage.success('已删除');
                loadTable(false);
            } else {
                ElementPlus.ElMessage.error(res.message);
            }
        }

        function openCreate() {
            createForm.value = { username: '', realName: '', password: '' };
            createVisible.value = true;
        }

        async function doCreate() {
            const f = createForm.value;
            if (!f.username || f.username.length < 3) {
                return ElementPlus.ElMessage.warning('用户名至少3位');
            }
            if (!f.password || f.password.length < 6) {
                return ElementPlus.ElMessage.warning('密码至少6位');
            }
            saving.value = true;
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: f.username,
                        password: f.password,
                        realName: f.realName || f.username,
                    }),
                }).then(r => r.json());
                if (res.code === 200) {
                    ElementPlus.ElMessage.success('用户创建成功');
                    createVisible.value = false;
                    loadTable(true);
                } else {
                    ElementPlus.ElMessage.error(res.message);
                }
            } finally {
                saving.value = false;
            }
        }

        function goBack()  { window.location.href = '/'; }
        function goLogin() { window.location.href = '/login.html'; }
        function navTo(page) { window.location.href = './' + page; }

        onMounted(() => {
            readAuth();
            if (allowed.value) loadTable(true);
        });

        return {
            allowed, authUser, stats,
            loading, rows, total, page, pageSize,
            filterQ, filterStatus,
            createVisible, createForm,
            resetVisible, resetTarget, newPassword,
            saving,
            loadTable, resetFilter,
            toggleStatus, openReset, doResetPassword,
            doDelete, openCreate, doCreate,
            goBack, goLogin, navTo,
        };
    }
}).use(ElementPlus).mount('#app');
</script>
</body>
</html>
